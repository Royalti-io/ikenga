<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HyperFrames</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <aside id="sidebar" aria-label="HyperFrames projects">
      <header>
        <span class="title">HyperFrames</span>
        <span id="status" class="status">connecting…</span>
      </header>
      <ul id="projects" role="listbox" aria-label="Projects"></ul>
      <p id="empty" class="empty" hidden>No projects found.</p>
    </aside>
    <main id="preview-pane" aria-label="Preview">
      <div id="placeholder" class="placeholder">
        <p>Select a project to start its preview.</p>
      </div>
      <iframe
        id="preview-frame"
        title="HyperFrames preview"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
        hidden
      ></iframe>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
