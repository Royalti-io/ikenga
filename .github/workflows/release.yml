name: Release

# Builds installers for macOS (ARM + Intel), Windows (x64), and Linux (x64)
# in parallel on each platform's native runner. Triggered by tag push (v*)
# or manual dispatch. Tag-triggered runs publish to a GitHub Release;
# dispatch runs upload artifacts only.
#
# Workspace deps (`@ikenga/contract`, `@ikenga/tokens`, `@ikenga/pkg-
# engine-claude-code`, the iyke MCP source) are sibling GitHub repos
# under royalti-io/. Each runner clones them into the right sibling
# directory and a synthesized `pnpm-workspace.yaml` lets bun resolve
# `workspace:*` references — bun walks up from shell/ and reads the
# pnpm-workspace.yaml the same way the local dev setup does.
#
# Setup before first run:
#   1. Create a fine-grained PAT with read access to:
#        royalti-io/ikenga-contract
#        royalti-io/ikenga-tokens
#        royalti-io/ikenga-pkg-engine-claude-code
#        royalti-io/ikenga-pkg-mcp-iyke
#      Add as `WORKSPACE_DEPS_PAT` secret on royalti-io/ikenga.
#      (Skip if all four repos are public — the default GITHUB_TOKEN suffices.)
#   2. Push a tag matching `v*` (e.g. `git tag v0.0.1 && git push origin v0.0.1`).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Which platforms to build (comma-separated; default = all)'
        type: choice
        options:
          - all
          - linux-only
          - mac-arm-only
          - mac-x64-only
          - mac-only
          - windows-only
        default: all

env:
  CARGO_TERM_COLOR: always
  # Note: GitHub's deprecation notice for Node 20 actions suggests
  # setting FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true here, but that
  # currently breaks the plan-job startup with no surfaced error
  # ("conclusion: failure" in 2 seconds, no steps logged). Will
  # revisit once GitHub stabilizes the opt-in path or the runners
  # default to Node.js 24 (2026-06-02). Until then we accept the
  # deprecation warnings — they don't affect builds.

jobs:
  # Build the matrix dynamically based on the dispatch input. GitHub
  # Actions doesn't expose `matrix.*` to job-level `if:` conditions, so
  # we can't filter legs after the fact — instead we synthesize the
  # JSON matrix here and feed it into the build job's
  # `strategy.matrix.include`. Tag-triggered runs default to `all` and
  # produce the full 4-leg matrix; manual dispatch narrows it.
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          input='${{ github.event.inputs.platforms }}'
          if [ -z "$input" ]; then input=all; fi
          echo "Selected platform set: $input"

          mac_arm='{"platform":"macos-latest","target":"aarch64-apple-darwin","arch_label":"macos-arm64"}'
          mac_x64='{"platform":"macos-latest","target":"x86_64-apple-darwin","arch_label":"macos-x64"}'
          windows='{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","arch_label":"windows-x64"}'
          linux='{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","arch_label":"linux-x64"}'

          case "$input" in
            all)            include="[$mac_arm,$mac_x64,$windows,$linux]" ;;
            linux-only)     include="[$linux]" ;;
            mac-arm-only)   include="[$mac_arm]" ;;
            mac-x64-only)   include="[$mac_x64]" ;;
            mac-only)       include="[$mac_arm,$mac_x64]" ;;
            windows-only)   include="[$windows]" ;;
            *) echo "::error::unknown platforms input: $input"; exit 1 ;;
          esac

          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    # `contents: write` so tauri-action can create the draft Release; the
    # WORKSPACE_DEPS_PAT used for sibling clones still needs its own scope.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      # ── Checkout shell + sibling workspace repos ────────────────────────────
      # Windows runners have core.symlinks=false by default; the shell repo
      # contains a symlink at src-tauri/resources/builtin-pkgs/com.ikenga.
      # engine-{claude-code,noop}/dist → ../../../../../pkgs/<pkg>/dist.
      # Without this flip, checkout writes the symlink as a regular file
      # containing the target path string, and Tauri's resource scan then
      # fails with "resource path … doesn't exist".
      - name: Enable git symlinks (Windows runner)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: git config --global core.symlinks true

      - name: Checkout shell
        uses: actions/checkout@v6
        with:
          path: shell

      - name: Checkout @ikenga/contract
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-contract
          path: contract
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout @ikenga/tokens
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-tokens
          path: tokens
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout @ikenga/pkg-engine-claude-code
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-pkg-engine-claude-code
          path: pkgs/engine-claude-code
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout @ikenga/pkg-engine-noop
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-pkg-engine-noop
          path: pkgs/engine-noop
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout iyke MCP source
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-pkg-mcp-iyke
          path: pkgs/mcp-iyke
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      # Synthesize the workspace root so `workspace:*` resolves the same way
      # it does on a developer machine. The shell's `iyke:mcp:build` script
      # references `../pkgs/mcp-iyke` relative to shell/ — sibling layout
      # below matches that contract.
      - name: Synthesize workspace
        shell: bash
        run: |
          cat > pnpm-workspace.yaml <<'EOF'
          packages:
            - shell
            - contract
            - tokens
            - pkgs/*
          EOF
          echo "Workspace layout:"
          ls -la

      # ── Toolchains ─────────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: shell/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # pnpm handles workspace:* resolution at the workspace root (matches
      # the local dev pattern — `pnpm install` at root, `bun run` from shell).
      # Without this step, bun install from shell/ doesn't walk up to find
      # the workspace and errors with "@ikenga/contract not found".
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node (for pnpm)
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # Linux runner needs WebKit + GTK headers. macOS / Windows runners
      # ship the platform SDKs by default.
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      # ── Frontend deps ──────────────────────────────────────────────────────
      # pnpm at workspace root creates the shell/node_modules/@ikenga/*
      # symlinks for the four sibling repos. Mirrors the local dev flow
      # (developer runs `pnpm install` at root, then `bun run X` from
      # shell/). --no-frozen-lockfile because the synthesized workspace
      # in CI is a subset of the local pnpm-lock.yaml's importers (we
      # don't clone cli/registry/cc-config — they're not part of the
      # shell build path).
      - name: pnpm install (workspace root)
        shell: bash
        run: pnpm install --no-frozen-lockfile

      # Build the workspace siblings' dist/ output. Each pkg gitignores its
      # dist (proper convention), and the shell references them through
      # symlinks under src-tauri/resources/builtin-pkgs/, plus type-import
      # via the @ikenga/* package mains that point at ./dist. Without this
      # step the Tauri build fails with:
      #   resource path `…/builtin-pkgs/com.ikenga.engine-claude-code/dist`
      #   doesn't exist
      - name: Build workspace siblings (contract, tokens, engine adapters)
        shell: bash
        run: |
          for pkg in '@ikenga/contract' '@ikenga/tokens' '@ikenga/pkg-engine-claude-code' '@ikenga/pkg-engine-noop'; do
            echo "==> pnpm -F $pkg build"
            pnpm -F "$pkg" build
          done

      # Materialize the engine adapter dist/ inside shell's resources tree.
      # Locally these are git-tracked symlinks that point at
      # pkgs/<engine>/dist; Windows runners don't preserve symlinks
      # reliably (even with core.symlinks=true, actions/checkout creates
      # file-symlinks rather than directory-junctions). On every CI host
      # we replace the symlink with a real copy of the freshly-built
      # dist so Tauri's resource scan finds the files.
      - name: Materialize engine dist into shell resources
        shell: bash
        run: |
          for engine in engine-claude-code engine-noop; do
            src="pkgs/${engine}/dist"
            dest="shell/src-tauri/resources/builtin-pkgs/com.ikenga.${engine}/dist"
            echo "==> $src → $dest"
            rm -rf "$dest"
            mkdir -p "$(dirname "$dest")"
            cp -r "$src" "$dest"
          done
          ls shell/src-tauri/resources/builtin-pkgs/com.ikenga.engine-claude-code/dist
          ls shell/src-tauri/resources/builtin-pkgs/com.ikenga.engine-noop/dist

      - name: Build iyke MCP binary
        shell: bash
        working-directory: shell
        env:
          TARGET: ${{ matrix.target }}
        run: bash scripts/build-iyke-mcp.sh

      - name: Vite build (frontend dist)
        shell: bash
        working-directory: shell
        run: bun run build

      # ── Tauri bundle ───────────────────────────────────────────────────────
      # ── Build + sign + (on tag push) publish a draft Release ──────────────
      # tauri-action runs `tauri build`, signs the installer with
      # TAURI_SIGNING_PRIVATE_KEY, generates the per-platform .sig +
      # latest.json updater artifacts (because bundle.createUpdaterArtifacts
      # is true in tauri.conf.json), and on tag push attaches everything to
      # a draft GitHub Release. Matrix jobs share the same tag and append
      # their platform's assets to the same draft.
      #
      # On workflow_dispatch we don't pass `tagName` — tauri-action still
      # builds + signs and exits with `artifactPaths`, which the next step
      # attaches as a workflow-run artifact for download via the UI.
      - name: Build + sign + release (tauri-action)
        id: tauri_action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: shell
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: 'Ikenga v__VERSION__'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      # Workflow-dispatch runs don't publish a release — surface the built
      # installers as a workflow-run artifact so the UI download still works.
      - name: Upload installers as workflow artifact (dispatch only)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ikenga-${{ matrix.arch_label }}
          path: |
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*-setup.exe
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/latest.json
          if-no-files-found: error
          retention-days: 14

  # ── Release publication ────────────────────────────────────────────────────
  # No separate `release:` job — `tauri-apps/tauri-action` in the build job
  # creates the draft GitHub Release inline on tag push (one per matrix
  # platform appends its assets + .sig to the same draft). Workflow_dispatch
  # runs upload the bundles as workflow-run artifacts instead.
