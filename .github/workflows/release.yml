name: Release

# Builds installers for macOS (ARM + Intel), Windows (x64), and Linux (x64)
# in parallel on each platform's native runner. Triggered by tag push (v*)
# or manual dispatch. Tag-triggered runs publish to a GitHub Release;
# dispatch runs upload artifacts only.
#
# Workspace layout in CI mirrors the local dev tree:
#   royalti-io/ikenga-contract  → contract/    (workspace:* in shell)
#   royalti-io/ikenga-tokens    → tokens/      (workspace:* in shell)
#   royalti-io/ikenga-pkgs      → ikenga-pkgs/ (canonical monorepo per ADR-009;
#                                               builtin pkg dist resolves
#                                               into here via symlinks, and
#                                               scripts/build-iyke-mcp.sh
#                                               bundles from
#                                               packages/mcp/iyke/)
#
# `@ikenga/pkg-engine-claude-code` is consumed from npm (shell pins ^0.2.0),
# not workspace-linked, since the cutover on 2026-05-18 retired its
# standalone clone.
#
# Setup before first run:
#   1. If any of contract / tokens / ikenga-pkgs go private, add a
#      fine-grained PAT with read access as `WORKSPACE_DEPS_PAT` secret
#      on royalti-io/ikenga. While all three are public, the default
#      GITHUB_TOKEN suffices.
#   2. Push a tag matching `v*` (e.g. `git tag v0.0.5 && git push origin v0.0.5`).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Which platforms to build (comma-separated; default = all)'
        type: choice
        options:
          - all
          - linux-only
          - mac-only
          - windows-only
        default: all

env:
  CARGO_TERM_COLOR: always
  # vite transforms ~12.6k modules; Node's default 2GB heap OOMs on
  # macOS runners during post-transform. We set NODE_OPTIONS at the
  # workflow level so it propagates to every `bun run build` invocation
  # — including the second one tauri-action triggers via tauri.conf.json's
  # `beforeBuildCommand`. A step-level env on the standalone Vite step
  # alone isn't enough.
  NODE_OPTIONS: --max-old-space-size=4096
  # Note: GitHub's deprecation notice for Node 20 actions suggests
  # setting FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true here, but that
  # currently breaks the plan-job startup with no surfaced error
  # ("conclusion: failure" in 2 seconds, no steps logged). Will
  # revisit once GitHub stabilizes the opt-in path or the runners
  # default to Node.js 24 (2026-06-02). Until then we accept the
  # deprecation warnings — they don't affect builds.

jobs:
  # Build the matrix dynamically based on the dispatch input. GitHub
  # Actions doesn't expose `matrix.*` to job-level `if:` conditions, so
  # we can't filter legs after the fact — instead we synthesize the
  # JSON matrix here and feed it into the build job's
  # `strategy.matrix.include`. Tag-triggered runs default to `all` and
  # produce the full 4-leg matrix; manual dispatch narrows it.
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          input='${{ github.event.inputs.platforms }}'
          if [ -z "$input" ]; then input=all; fi
          echo "Selected platform set: $input"

          # Single macOS leg: one universal-apple-darwin build (Intel + Apple
          # Silicon in one .app) instead of two per-arch jobs. macOS runners
          # bill at a 10x minute multiplier even on public repos, so halving
          # the macOS job count removes a full runner's worth of duplicated
          # checkout + pnpm install + workspace/vite builds per release.
          mac='{"platform":"macos-latest","target":"universal-apple-darwin","arch_label":"macos-universal"}'
          windows='{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","arch_label":"windows-x64"}'
          linux='{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","arch_label":"linux-x64"}'

          case "$input" in
            all)            include="[$mac,$windows,$linux]" ;;
            linux-only)     include="[$linux]" ;;
            mac-only)       include="[$mac]" ;;
            windows-only)   include="[$windows]" ;;
            *) echo "::error::unknown platforms input: $input"; exit 1 ;;
          esac

          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    # `contents: write` so tauri-action can create the draft Release; the
    # WORKSPACE_DEPS_PAT used for sibling clones still needs its own scope.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      # ── Checkout shell + sibling workspace repos ────────────────────────────
      # Windows runners have core.symlinks=false by default; the shell repo
      # contains a symlink at src-tauri/resources/builtin-pkgs/com.ikenga.
      # engine-claude-code/dist → ../../../../../ikenga-pkgs/packages/engine/
      # claude-code/dist. Without this flip, checkout writes the symlink as
      # a regular file containing the target path string, and Tauri's
      # resource scan then fails with "resource path … doesn't exist".
      - name: Enable git symlinks (Windows runner)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: git config --global core.symlinks true

      - name: Checkout shell
        uses: actions/checkout@v6
        with:
          path: shell

      - name: Checkout @ikenga/contract
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-contract
          path: contract
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout @ikenga/tokens
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-tokens
          path: tokens
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      # Canonical pkg monorepo (ADR-009). Provides:
      #   - The engine-cc dist that shell's builtin symlink targets.
      #   - The mcp-iyke source that scripts/build-iyke-mcp.sh bundles.
      # NOTE: this is a separate, self-contained pnpm workspace — we do not
      # add its packages to the synthesized outer workspace (pnpm doesn't
      # support nested workspaces).
      - name: Checkout royalti-io/ikenga-pkgs
        uses: actions/checkout@v6
        with:
          repository: royalti-io/ikenga-pkgs
          path: ikenga-pkgs
          token: ${{ secrets.WORKSPACE_DEPS_PAT || secrets.GITHUB_TOKEN }}

      # Synthesize the outer workspace so shell's two remaining workspace:*
      # deps (@ikenga/contract, @ikenga/tokens) resolve the same way they
      # do locally. @ikenga/pkg-engine-claude-code is consumed via npm
      # (^0.2.0) post-cutover, so it does NOT need a workspace entry here.
      - name: Synthesize workspace
        shell: bash
        run: |
          cat > pnpm-workspace.yaml <<'EOF'
          packages:
            - shell
            - contract
            - tokens
          EOF
          echo "Workspace layout:"
          ls -la

      # ── Toolchains ─────────────────────────────────────────────────────────
      # `universal-apple-darwin` is not a real rustc target — Tauri lipos two
      # real targets, so both must be installed for the universal build.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      # rust-cache keyed per matrix.target. With the macOS leg consolidated to
      # one universal target dir (was two per-arch dirs), the repo's total
      # target/ cache footprint drops below GitHub's 10 GB cache cap, so legs
      # stop evicting each other and warm-cache compiles actually hit.
      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: shell/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # pnpm handles workspace:* resolution at the workspace root (matches
      # the local dev pattern — `pnpm install` at root, `bun run` from shell).
      # Without this step, bun install from shell/ doesn't walk up to find
      # the workspace and errors with "@ikenga/contract not found".
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node (for pnpm)
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # Linux runner needs WebKit + GTK headers. macOS / Windows runners
      # ship the platform SDKs by default.
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      # ── Frontend deps ──────────────────────────────────────────────────────
      # pnpm at workspace root creates the shell/node_modules/@ikenga/*
      # symlinks for the four sibling repos. Mirrors the local dev flow
      # (developer runs `pnpm install` at root, then `bun run X` from
      # shell/). --no-frozen-lockfile because the synthesized workspace
      # in CI is a subset of the local pnpm-lock.yaml's importers (we
      # don't clone cli/registry/cc-config — they're not part of the
      # shell build path).
      - name: pnpm install (workspace root)
        shell: bash
        run: pnpm install --no-frozen-lockfile

      # Build the workspace siblings' dist/ output. Each pkg gitignores its
      # dist (proper convention), and the shell references them through
      # symlinks under src-tauri/resources/builtin-pkgs/, plus type-import
      # via the @ikenga/* package mains that point at ./dist. Without this
      # step the Tauri build fails with:
      #   resource path `…/builtin-pkgs/com.ikenga.engine-claude-code/dist`
      #   doesn't exist
      - name: Build outer workspace siblings (contract, tokens)
        shell: bash
        run: |
          for pkg in '@ikenga/contract' '@ikenga/tokens'; do
            echo "==> pnpm -F $pkg build"
            pnpm -F "$pkg" build
          done

      # ikenga-pkgs is its own pnpm workspace. Install + build its members
      # so the engine-cc dist exists for the symlink target below and
      # scripts/build-iyke-mcp.sh can bundle from packages/mcp/iyke/.
      - name: Install + build ikenga-pkgs (nested workspace)
        shell: bash
        working-directory: ikenga-pkgs
        run: |
          pnpm install --frozen-lockfile
          pnpm -r build

      # Materialize the engine-cc dist/ inside shell's resources tree.
      # Locally this is a git-tracked symlink that points at
      # ikenga-pkgs/packages/engine/claude-code/dist; Windows runners
      # don't preserve symlinks reliably (even with core.symlinks=true,
      # actions/checkout creates file-symlinks rather than directory-
      # junctions). On every CI host we replace the symlink with a real
      # copy of the freshly-built dist so Tauri's resource scan finds
      # the files.
      - name: Materialize engine-cc dist into shell resources
        shell: bash
        run: |
          src="ikenga-pkgs/packages/engine/claude-code/dist"
          dest="shell/src-tauri/resources/builtin-pkgs/com.ikenga.engine-claude-code/dist"
          echo "==> $src → $dest"
          rm -rf "$dest"
          mkdir -p "$(dirname "$dest")"
          cp -r "$src" "$dest"
          ls "$dest"

      - name: Build iyke MCP binary
        shell: bash
        working-directory: shell
        env:
          TARGET: ${{ matrix.target }}
        run: bash scripts/build-iyke-mcp.sh

      - name: Vite build (frontend dist)
        shell: bash
        working-directory: shell
        run: bun run build

      # ── Tauri bundle ───────────────────────────────────────────────────────
      # ── Build + sign + (on tag push) publish a draft Release ──────────────
      # tauri-action runs `tauri build`, signs the installer with
      # TAURI_SIGNING_PRIVATE_KEY, generates the per-platform .sig +
      # latest.json updater artifacts (because bundle.createUpdaterArtifacts
      # is true in tauri.conf.json), and on tag push attaches everything to
      # a draft GitHub Release. Matrix jobs share the same tag and append
      # their platform's assets to the same draft.
      #
      # On workflow_dispatch we don't pass `tagName` — tauri-action still
      # builds + signs and exits with `artifactPaths`, which the next step
      # attaches as a workflow-run artifact for download via the UI.
      - name: Build + sign + release (tauri-action)
        id: tauri_action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: shell
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: 'Ikenga v__VERSION__'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      # Workflow-dispatch runs don't publish a release — surface the built
      # installers as a workflow-run artifact so the UI download still works.
      - name: Upload installers as workflow artifact (dispatch only)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ikenga-${{ matrix.arch_label }}
          path: |
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*-setup.exe
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/**/latest.json
          if-no-files-found: error
          retention-days: 14

  # ── Release publication ────────────────────────────────────────────────────
  # `tauri-apps/tauri-action` in the build job creates the draft GitHub
  # Release inline on tag push (one per matrix platform appends its
  # assets + .sig to the same draft). Workflow_dispatch runs upload the
  # bundles as workflow-run artifacts instead.
  #
  # The `notes` job below runs after the matrix completes and backfills:
  #   1. The GH Release body — a categorized commit log between the previous
  #      tag and this tag, grouped by conventional-commit prefix
  #      (feat / fix / refactor / etc.), plus a compare-link footer.
  #   2. The `notes` field inside `latest.json` (what the in-app updater UI
  #      shows). `latest.json` itself isn't signed — only the bundles
  #      referenced inside it are — so re-uploading with edited notes is
  #      safe and doesn't require the signing key.
  #
  # Why git log instead of GitHub's generate-notes API: this repo commits
  # directly to main (no PR-per-feature workflow), so generate-notes returns
  # only the "Full Changelog" link with no body. Conventional-commit
  # prefixes give us enough structure to group commits ourselves.
  #
  # If you'd rather hand-curate the body, run
  # `gh release edit vX.Y.Z --notes-file path/to/notes.md` after the
  # release publishes; that overrides whatever this job wrote.
  notes:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout shell (full history for git log)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate + apply release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # Previous tag (the one immediately before $TAG in tag history).
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "::warning::no previous tag found; using full history"
            RANGE="HEAD"
          else
            RANGE="${PREV}..${TAG}"
          fi

          # Group commits by conventional-commit prefix. Falls into
          # "Other" when the message doesn't start with a recognized prefix.
          BODY_FILE=/tmp/body.md
          {
            echo "# Ikenga $TAG"
            echo ""
            COUNT=$(git log "$RANGE" --pretty="%s" | wc -l)
            if [ -n "$PREV" ]; then
              echo "$COUNT commits since $PREV."
            else
              echo "$COUNT commits."
            fi
            echo ""

            for section in 'feat:Features' 'fix:Fixes' 'refactor:Refactors' 'perf:Performance' 'docs:Docs' 'test:Tests' 'ci:CI / Build' 'build:CI / Build' 'chore:Chores'; do
              prefix="${section%%:*}"
              title="${section##*:}"
              entries=$(git log "$RANGE" --pretty="- %s" | grep -E "^- ${prefix}(\(|:)" || true)
              if [ -n "$entries" ]; then
                echo "## $title"
                echo ""
                printf '%s\n\n' "$entries"
              fi
            done

            # Anything that didn't match any prefix above.
            other=$(git log "$RANGE" --pretty="- %s" | grep -vE "^- (feat|fix|refactor|perf|docs|test|ci|build|chore)(\(|:)" || true)
            if [ -n "$other" ]; then
              echo "## Other"
              echo ""
              printf '%s\n\n' "$other"
            fi

            echo "---"
            echo ""
            echo "**Full Changelog:** https://github.com/$REPO/compare/${PREV:-}...${TAG}"
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "# macOS / Linux — AppImage (portable)"
            echo "curl -fsSL https://ikenga.dev/install.sh | sh"
            echo ""
            echo "# Linux — system-wide .deb"
            echo "curl -fsSL https://ikenga.dev/install.sh | IKENGA_FORMAT=deb sh"
            echo ""
            echo "# Windows — Git Bash / MSYS / Cygwin"
            echo "curl -fsSL https://ikenga.dev/install.sh | sh"
            echo '```'
          } > "$BODY_FILE"

          # Write the body AND flip the draft to published in one call —
          # tauri-action leaves the release as a draft so the per-platform
          # build jobs can attach assets atomically; we promote it now that
          # all assets are in and the body is final.
          gh release edit "$TAG" --repo "$REPO" --notes-file "$BODY_FILE" --draft=false

          # Short summary for latest.json (in-app updater UI). Take the
          # commit-count line + the first feat (if any) + a pointer.
          SHORT=$(printf 'Ikenga %s — %s See %s for full notes.' \
            "$TAG" \
            "$(awk 'NR==3' "$BODY_FILE")" \
            "https://github.com/$REPO/releases/tag/$TAG")

          # Rebuild latest.json from scratch, here, serially. Each matrix
          # build job runs tauri-action with includeUpdaterJson, and every
          # one does a read-modify-write of the SAME latest.json on the
          # shared draft release. Running concurrently, they clobber each
          # other (lost updates) and the published manifest ends up missing
          # whichever platforms lost the race — breaking auto-update for
          # those users. So we don't trust the survivor: we download every
          # per-platform .sig attached to the release and reconstruct the
          # full platform map deterministically from the known bundle names.
          VERSION="${TAG#v}"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          SIGDIR=$(mktemp -d)
          gh release download "$TAG" --repo "$REPO" -p '*.sig' -D "$SIGDIR"

          # Writes a real file named latest.json (not a mktemp name) so we
          # never leave a stray tmp.*.json asset on the release.
          node -e '
            const fs = require("fs"), path = require("path");
            const [dir, base, version, notes] = process.argv.slice(1);
            const has  = f => fs.existsSync(path.join(dir, f));
            const read = f => fs.readFileSync(path.join(dir, f), "utf8").trim();
            // [updater platform key, .sig filename, bundle filename]
            //
            // tauri-plugin-updater resolves `{os}-{arch}-{installer}` FIRST,
            // then falls back to `{os}-{arch}`. The installer suffix comes
            // from the bundle type stamped into the running binary at build
            // time — so a deb-installed shell looks for `linux-x86_64-deb`.
            // Without that key it fell back to `linux-x86_64`, downloaded
            // the AppImage, and install_deb rejected it (InvalidUpdaterFormat)
            // AFTER the progress bar completed. The deb + deb.sig are already
            // built and attached (createUpdaterArtifacts signs them); list them.
            // macOS is now a single universal-apple-darwin .app. The exact
            // updater filename for a universal build (e.g. Ikenga.app.tar.gz vs
            // Ikenga_universal.app.tar.gz) varies by toolchain version, so we
            // resolve it from the actual .sig attached to the release rather
            // than hard-coding — a wrong name here silently breaks auto-update.
            // Both arch keys (and their -app fallbacks) point at the one
            // universal bundle so existing Intel + Apple-Silicon installs keep
            // updating from the same artifact.
            const macSig = fs.readdirSync(dir).find(f => f.endsWith(".app.tar.gz.sig"));
            if (!macSig) console.log("::warning::no macOS .app.tar.gz.sig on release — darwin updater entries skipped");
            const macBundle = macSig ? macSig.replace(/\.sig$/, "") : null;
            const darwin = macSig ? [
              ["darwin-aarch64",      macSig, macBundle],
              ["darwin-aarch64-app",  macSig, macBundle],
              ["darwin-x86_64",       macSig, macBundle],
              ["darwin-x86_64-app",   macSig, macBundle],
            ] : [];
            const map = [
              ...darwin,
              ["windows-x86_64",      "Ikenga_" + version + "_x64-setup.exe.sig",  "Ikenga_" + version + "_x64-setup.exe"],
              ["windows-x86_64-nsis", "Ikenga_" + version + "_x64-setup.exe.sig",  "Ikenga_" + version + "_x64-setup.exe"],
              ["linux-x86_64",        "Ikenga_" + version + "_amd64.AppImage.sig", "Ikenga_" + version + "_amd64.AppImage"],
              ["linux-x86_64-deb",    "Ikenga_" + version + "_amd64.deb.sig",      "Ikenga_" + version + "_amd64.deb"],
            ];
            const platforms = {};
            for (const [key, sig, bundle] of map) {
              if (has(sig)) platforms[key] = { signature: read(sig), url: base + "/" + bundle };
              else console.log("::warning::no .sig for updater platform " + key + " (" + sig + ")");
            }
            const out = { version, notes, pub_date: new Date().toISOString(), platforms };
            fs.writeFileSync("latest.json", JSON.stringify(out, null, 2) + "\n");
            console.log("latest.json platforms: " + Object.keys(platforms).join(", "));
          ' "$SIGDIR" "$BASE" "$VERSION" "$SHORT"

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

          echo "✓ Release notes + complete updater manifest applied to $TAG"
